# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################


# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORMTHEME,qt6ct

env = HYPRCURSOR_THEME,theme_minecraft-hypr
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,minecraft-theme # Keep as fallback for GTK apps
env = XCURSOR_SIZE,24

# Nvidia drivers
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = __GL_GSYNC_ALLOWED,0
# env = __GL_VRR_ALLOWED,0
env = GBM_BACKEND,nvidia-drm

# Additional
env = MANGOHUD_CONFIGFILE,$HOME/.config/MangoHud/MangoHud.conf

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/

monitor=,highrr,auto,auto


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty bash
$fileManager = dolphin
$menu = wofi --show=drun
$browser = chromium


#################
### AUTOSTART ###
#################

# System
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent

# Programs
exec-once = $browser 
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = pasystray
exec-once = wl-paste --type text --watch cliphist store
exec-once = waybar 
exec-once = awww-daemon
exec-once = swaync
exec-once = swaync-client -df
exec-once = swayosd-server -s ~/.config/swayosd/style.css
exec-once = systemctl --user enable --now opentabletdriver
exec-once = sleep 1 && krita &
exec-once = sleep 1 && spotify-launcher &
exec-once = sleep 1 && 4ed &


###################
### EXEC RELOAD ###
###################

# Once reloading config these settings execute/set/apply
exec = wal -s -t -i ~/wallpapers/pywallpaper.jpg && pkill -SIGUSR2 waybar


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(ffffffee) rgba(ffe5eaee) 45deg
    col.inactive_border = rgba(636363ee)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 1.0
    fullscreen_opacity = 1

    # https://wiki.hypr.land/Configuring/Variables
    blur {
        enabled = true
        size = 8              # bigger radius → softer blur (frosted glass)
        passes = 4             # more passes → smoother blur
        new_optimizations = on # helps performance
        contrast = 1.0
        brightness = 1.0
        noise = 0.015          # subtle grain prevents banding
        vibrancy = 0.2 
        popups = true
    }
    
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1F1D19ee)
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true

    bezier = curve, 0, 1, 0, 1

    animation = windows, 1, 2, curve, slide 
    animation = border, 1, 5, default
    animation = fade, 0, 3, default
    animation = workspaces, 1, 2, curve, fade 
}


# https://wiki.hypr.land/Configuring/XWayland/
xwayland {
  force_zero_scaling = true
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    focus_on_activate = true
}


###############
### DEVICES ###
###############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,jp
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.5 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat

    tablet {
	transform = 0
        output = 
        region_position = 0 0
        region_size = 0 0
        relative_input = false
    }

    touchpad {
        natural_scroll = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = 0
}
device {
    name = opentabletdriver-virtual-artist-tablet
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, kitty -e tmux new-session -A -s main
bind = $mainMod, B, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, fullscreen

# Select scripts
bind = $mainMod, W, exec, ~/.config/hypr/wallpaper.sh
bind = $mainMod, S, exec, ~/.config/waybar/scripts/select.sh

# Toggle scripts
bind = $mainMod, T, exec, ~/.bash-scripts/tablet-control.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window with alt + arrow keys
bind = $mainMod ALT, left, movewindow, l
bind = $mainMod ALT, right, movewindow, r
bind = $mainMod ALT, up, movewindow, u
bind = $mainMod ALT, down, movewindow, d

# Move window with mainMod + mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshot keys + location
bind = CTRL, Print, exec, hyprshot -m region -o ~/Screenshots/
bind = , Print, exec, hyprshot -m window -o ~/Screenshots/
bind = ALT, Print, exec, hyprshot -m active -m output -o ~/Screenshots/

# Hyprlock :3
bind = $mainMod, l, exec, hyprlock

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Define osd for swayosd support
$osd = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

# General system commands
bindel = , XF86AudioRaiseVolume,  exec, $osd --output-volume raise
bindel = , XF86AudioLowerVolume,  exec, $osd --output-volume lower
bindel = , XF86MonBrightnessUp,   exec, $osd --brightness +10
bindel = , XF86MonBrightnessDown, exec, $osd --brightness -10

# Requires playerctl
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous


##################
### LAYERRULES ###
##################

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar

layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window

layerrule = no_anim on, match:namespace selection

layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0.5, match:namespace swayosd


####################
### WINDOW RULES ###
####################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# WORKSPACE RULES FOR PROGRAMS
windowrule {
    name = krita-open
    match:class = ^krita$
    workspace = 2 silent
}
windowrule {
    name = 4coder-open
    match:class = ^4coder$
    workspace = 5 silent
}
windowrule {
    name = spotify-open
    match:class = ^spotify$
    workspace = 10 silent
}
windowrule {
    name = wireshark-open
    match:class = ^org\.wireshark\.Wireshark$
    float = true
}

# GLOBAL: Prevent apps from maximizing themselves (Cleaner tiling)
windowrule {
    name = global-no-maximize
    match:class = .*
    suppress_event = maximize
}

# XWAYLAND FALLBACK: Fixes for apps that can't do Native Wayland
windowrule {
    name = xwayland-compat
    match:xwayland = true 
    opaque = true
}
